<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        * {
        margin: 0;
        padding: 0;
        text-decoration: none;
        }

        .container {
        width: 100%;
        background: rgba(117, 0, 18, 0.25);
        }

        .header {
        width: 1440px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: auto;
        padding: 12px 0px;
        }

        .header .left {
        display: flex;
        align-items: center;
        gap: 24px;
        }

        .header .left .logo {
        display: flex;
        align-items: center;
        gap: 16px;
        }

        .header .left .logo h3 {
        font-size: 24px;
        color: #750012;
        }

        .header .left .nav {
        display: flex;
        gap: 8px;
        }

        .header .left .nav a {
        color: #750012;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: .4s;
        }

        .header .left .nav a svg {
        width: 16px;
        stroke: #750012;
        transition: .4s;
        }

        .header .left .nav a:hover {
        color: green;
        }

        .header .left .nav a:hover svg {
        stroke: green;
        }

    </style>
</head>
<body>
    {% block header %}
    {% endblock %}

    {% block content %}
    {% endblock %}

    {% block footer %}
    {% endblock %}
</body>
</html>
